# Gonic's flagconf format: one "flag value" per line (not TOML).
# Start it with:
#   mkdir -p ~/.gonic/{cache,tmp,podcasts,playlists}
#   TMPDIR="$HOME/.gonic/tmp" gonic -config-path ./server/gonic.example.conf
# Keep this music path in sync with [paths].generated_library_root in server/config.toml.
music-path /home/damian/Music

# Keep all Gonic-owned runtime data under ~/.gonic.
db-path $HOME/.gonic/gonic.db
cache-path $HOME/.gonic/cache
podcast-path $HOME/.gonic/podcasts
playlists-path $HOME/.gonic/playlists

# Local-only test listener.
listen-addr 127.0.0.1:4747
# Avoid logging Subsonic query credentials in the local Gonic log.
http-log false

# Scan at startup, then detect generated-library updates through both the
# filesystem watcher and a one-minute reconciliation scan.
scan-at-start-enabled true
scan-watcher-enabled true
scan-interval 1
